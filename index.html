<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Panini WC 2026</title>
<meta name="theme-color" content="#1a1a2e" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<style>
:root{--dark:#1a1a2e;--gold:#D4AF37;--bg:#f4f6fa;--card:#fff;--text:#1f2330;--muted:#7c8195;--green:#4CAF50;--orange:#FF9800;--red:#E53935;--shadow:0 6px 18px rgba(0,0,0,.08);--radius:14px}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;background:var(--bg);color:var(--text);padding-bottom:92px}
.header{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,var(--dark),#16213e);color:#fff;padding:14px 14px 12px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.header h1{margin:0;font-size:18px;font-weight:900;letter-spacing:.2px}
.header small{display:block;margin-top:2px;color:rgba(255,255,255,.75);font-weight:800;font-size:11px}
.header .meta{display:flex;justify-content:center;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);border:1px solid rgba(212,175,55,.35);padding:6px 10px;border-radius:999px;font-weight:900;font-size:12px}
.badge button{border:none;background:rgba(212,175,55,.9);color:var(--dark);font-weight:1100;padding:6px 10px;border-radius:999px;cursor:pointer}
.badge .link{text-decoration:underline;cursor:pointer}
.page{display:none;padding:14px}
.page.active{display:block}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:12px}
.search{flex:1;position:relative}
.search input{width:100%;padding:12px 14px 12px 38px;border-radius:999px;border:2px solid #e5e7ef;outline:none;font-weight:900}
.search input:focus{border-color:rgba(212,175,55,.9)}
.search .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-weight:1200}
.pillbtn{border:none;border-radius:999px;padding:10px 12px;background:#e9ecf7;color:#2a3a6a;font-weight:1100;cursor:pointer}
.team-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media (min-width:360px){.team-grid{grid-template-columns:repeat(3,1fr)}}
@media (min-width:420px){.team-grid{grid-template-columns:repeat(4,1fr)}}
.team-card{background:var(--card);border-radius:var(--radius);padding:12px 10px;text-align:center;box-shadow:var(--shadow);cursor:pointer;position:relative;overflow:hidden}
.team-card.near{box-shadow:0 0 0 2px rgba(212,175,55,.35),0 10px 26px rgba(212,175,55,.18)}
.team-card.complete{box-shadow:0 0 0 2px rgba(76,175,80,.35),0 10px 26px rgba(76,175,80,.18)}
.team-card .flag{font-size:26px;line-height:1;display:flex;justify-content:center}
.team-card .flag img{width:26px;height:16px;border-radius:3px;display:block}
.team-card .code{margin-top:6px;font-size:14px;font-weight:1200;letter-spacing:.7px}
.team-card .sub{margin-top:4px;font-size:11px;color:var(--muted);font-weight:900}
.team-card .prog{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.06);padding:4px 8px;border-radius:999px;font-size:11px;font-weight:1100;color:#2f3446}
.topline{display:flex;gap:10px;align-items:center;margin-bottom:10px}
.back{border:none;background:#e9ecf7;border-radius:12px;padding:10px 12px;font-weight:1100;color:#2a3a6a;cursor:pointer}
.titleblock{flex:1}
.titleblock h2{margin:0;font-size:16px;font-weight:1200}
.titleblock small{display:block;margin-top:2px;color:var(--muted);font-weight:900;font-size:11px}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.cell{background:#eef1f6;border-radius:14px;padding:16px 0;text-align:center;font-weight:1200;font-size:15px;cursor:pointer;position:relative;user-select:none;touch-action:manipulation}
.cell.owned{background:rgba(76,175,80,.92);color:#fff}
.cell.dup{background:rgba(255,152,0,.92);color:#fff;box-shadow:inset 0 0 0 2px rgba(255,255,255,.25)}
.cell.res{outline:2px dashed rgba(229,57,53,.9);outline-offset:-4px}
.cell .count{position:absolute;bottom:4px;right:7px;font-size:11px;font-weight:1200;opacity:.95}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:74px;background:rgba(17,20,31,.96);color:#fff;padding:10px 14px;border-radius:999px;font-weight:1100;font-size:12px;display:none;max-width:92vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.undo{position:fixed;left:50%;transform:translateX(-50%);bottom:118px;background:#fff;border:1px solid #d7dae6;padding:10px 14px;border-radius:999px;font-weight:1100;display:none;box-shadow:0 10px 28px rgba(0,0,0,.12);cursor:pointer}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--dark);display:flex;z-index:60;box-shadow:0 -2px 14px rgba(0,0,0,.25)}
.nav button{flex:1;border:none;background:transparent;color:rgba(255,255,255,.75);padding:12px 10px 10px;font-weight:1100;cursor:pointer}
.nav button.active{color:var(--gold)}
.nav .ico{display:block;font-size:18px}
.nav .lbl{display:block;font-size:10px;margin-top:2px;letter-spacing:.4px}
.list{display:flex;flex-direction:column;gap:10px}
.item{background:var(--card);border-radius:var(--radius);padding:12px;box-shadow:var(--shadow)}
.item .row{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.item b{font-size:14px}
.item small{display:block;color:var(--muted);font-weight:900}
.kpis{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
.kpi{background:#f1f4ff;border:1px solid #e3e7ff;border-radius:999px;padding:6px 10px;font-weight:1100;font-size:12px;color:#2a3a6a}
.kpi.orange{background:#fff3e0;border-color:#ffe0b2;color:#7a4c00}
.kpi.green{background:#e8f5e9;border-color:#c8e6c9;color:#1e6b2a}
.kpi.red{background:#ffebee;border-color:#ffcdd2;color:#8b1c1c}
.controls{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
.btn{border:none;border-radius:12px;padding:10px 12px;font-weight:1100;cursor:pointer}
.btn.primary{background:#1565C0;color:#fff}
.btn.gray{background:#e6e8f2;color:#2b3146}
.btn.danger{background:#ffebee;color:#8b1c1c}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:90;align-items:center;justify-content:center;padding:14px}
.modal.show{display:flex}
.modal .box{width:100%;max-width:460px;background:#fff;border-radius:18px;padding:16px}
.modal .box h3{margin:0 0 10px;font-size:16px;font-weight:1200}
.modal .box .sub{color:var(--muted);font-weight:900;font-size:12px;margin-bottom:12px}
.modal .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal input{width:100%;padding:12px 14px;border-radius:14px;border:2px solid #e5e7ef;outline:none;font-weight:900}
.modal input:focus{border-color:rgba(212,175,55,.9)}
.modal .actions{display:flex;gap:10px;margin-top:12px}
.modal .actions button{flex:1}
.drawer{position:fixed;left:0;right:0;bottom:-100%;background:#fff;border-top-left-radius:20px;border-top-right-radius:20px;z-index:85;box-shadow:0 -14px 40px rgba(0,0,0,.22);transition:bottom .22s ease}
.drawer.show{bottom:0}
.drawer .pad{padding:14px}
.drawer .hdr{display:flex;justify-content:space-between;align-items:center}
.drawer .hdr b{font-size:16px}
.drawer .close{border:none;background:#e6e8f2;border-radius:999px;padding:8px 10px;font-weight:1100;cursor:pointer}
.stepper{display:flex;align-items:center;gap:10px;margin-top:12px}
.stepper button{width:44px;height:44px;border:none;border-radius:14px;background:#e9ecf7;font-weight:1300;font-size:18px;cursor:pointer}
.stepper .val{flex:1;text-align:center;font-size:20px;font-weight:1300}
.note{margin-top:10px;color:var(--muted);font-weight:900;font-size:12px}
</style>
</head>
<body>
<div class="header">
  <h1>⚽ Panini WC 2026</h1>
  <small id="subtitle"></small>
  <div class="meta">
    <div class="badge" id="progressBadge">0 / 980</div>
    <div class="badge" id="langBadge"><span class="link" id="langToggle">🌐 EN</span></div>
    <div class="badge" id="userBadge" style="display:none"></div>
    <div class="badge" id="loginBadge" style="display:none"><span id="loginText"></span> <button onclick="openAuth()" id="loginBtn"></button></div>
  </div>
</div>

<div class="page active" id="pageTeams">
  <div class="toolbar">
    <div class="search"><span class="icon">🔎</span><input id="teamSearch" /></div>
    <button class="pillbtn" onclick="toggleGroupMode()" id="groupBtn"></button>
  </div>
  <div id="teamContainer"></div>
</div>

<div class="page" id="pageTeamGrid">
  <div class="topline">
    <button class="back" onclick="goTeams()" id="backTeams"></button>
    <div class="titleblock">
      <h2 id="teamTitle">Team</h2>
      <small id="teamSub"></small>
    </div>
    <button class="pillbtn" onclick="openDupForTeam()" title="Duplicates">📦</button>
  </div>
  <div class="grid" id="stickerGrid"></div>
  <div class="note" id="gridHint"></div>
</div>

<div class="page" id="pageDuplicates">
  <div class="toolbar">
    <div class="search"><span class="icon">🔎</span><input id="dupSearch" /></div>
  </div>
  <div class="toolbar" style="margin-top:-6px">
    <button class="pillbtn" id="fAvail" onclick="toggleFilter('avail')"></button>
    <button class="pillbtn" id="fRes" onclick="toggleFilter('reserved')"></button>
    <button class="pillbtn" id="fSort" onclick="toggleFilter('sort')"></button>
  </div>
  <div class="list" id="dupList"></div>
</div>

<div class="page" id="pageTrades">
  <div class="toolbar">
    <button class="pillbtn" onclick="refreshTrades()" id="findTrades"></button>
    <button class="pillbtn" onclick="copyMyMissing()" id="copyMissing"></button>
  </div>
  <div class="toolbar" style="margin-top:-6px">
    <button class="pillbtn" onclick="toggleTradeMode()" id="tradeModeBtn"></button>
  </div>
  <div class="note" id="tradeHint"></div>
  <div class="list" id="tradeList" style="margin-top:12px"></div>
</div>

<div class="toast" id="toast"></div>
<div class="undo" id="undoBtn" onclick="undo()">↩ Undo</div>

<div class="modal" id="authModal">
  <div class="box">
    <h3 id="authTitle"></h3>
    <div class="sub" id="authSub"></div>
    <div class="grid2">
      <input id="authEmail" placeholder="Email" autocomplete="email" />
      <input id="authPass" placeholder="Password" type="password" autocomplete="current-password" />
    </div>
    <div class="grid2" style="margin-top:10px">
      <input id="authName" />
      <input id="authClass" />
    </div>
    <div class="actions">
      <button class="btn primary" onclick="login()" id="authLogin"></button>
      <button class="btn gray" onclick="signup()" id="authCreate"></button>
    </div>
    <div class="note" id="authErr" style="color:var(--red);min-height:18px"></div>
    <div class="actions" style="margin-top:6px">
      <button class="btn gray" onclick="closeAuth()" id="authClose"></button>
    </div>
    <div class="note" id="authFoot"></div>
  </div>
</div>

<div class="drawer" id="editDrawer">
  <div class="pad">
    <div class="hdr">
      <b id="editTitle">Sticker</b>
      <button class="close" onclick="closeEditor()" id="editClose"></button>
    </div>
    <div class="stepper">
      <button onclick="adjOwned(-1)">−</button>
      <div class="val" id="ownedVal">0</div>
      <button onclick="adjOwned(1)">+</button>
    </div>
    <div class="note" id="ownedNote"></div>
    <div class="stepper" style="margin-top:10px">
      <button onclick="adjRes(-1)">−</button>
      <div class="val" id="resVal">0</div>
      <button onclick="adjRes(1)">+</button>
    </div>
    <div class="note" id="resNote"></div>
    <div class="controls" style="margin-top:12px">
      <button class="btn danger" onclick="clearSticker()" id="clearBtn"></button>
      <button class="btn gray" onclick="quickReserve()" id="reserve1"></button>
      <button class="btn gray" onclick="quickUnreserve()" id="unreserve1"></button>
    </div>
  </div>
</div>

<div class="nav">
  <button id="navTeams" class="active" onclick="showPage('Teams')"><span class="ico">🏁</span><span class="lbl" id="navTeamsLbl"></span></button>
  <button id="navDup" onclick="showPage('Duplicates')"><span class="ico">📦</span><span class="lbl" id="navDupLbl"></span></button>
  <button id="navTrades" onclick="showPage('Trades')"><span class="ico">🤝</span><span class="lbl" id="navTradesLbl"></span></button>
</div>

function normalizeEntry(v){
  const owned=Math.max(0, parseInt(v?.owned||0,10)||0);
  const reserved=Math.max(0, parseInt(v?.reserved||0,10)||0);

    const v=normalizeEntry(collection[key]||{});

    const count = v.owned>1 ? `<div class="count">x${v.owned}</div>` : '';
    html += `<div class="${cls}" data-key="${key}">${n}${count}</div>`;
  }
  stickerGrid.innerHTML=html;

function renderDuplicates(){
  const q=(dupSearch.value||'').trim().toUpperCase().replace(/\s+/g,'');
  let entries = Object.entries(collection).map(([k,v])=>[k,normalizeEntry(v)]).filter(([k,v])=>v.owned>1);
  if(q) entries = entries.filter(([k,v])=>k.replace('-','').includes(q));
  if(dupFilters.avail) entries = entries.filter(([k,v])=>(v.owned-v.reserved)>0);
  if(dupFilters.reserved) entries = entries.filter(([k,v])=>v.reserved>0);
  if(dupFilters.sort) entries.sort((a,b)=>((b[1].owned-b[1].reserved)-(a[1].owned-a[1].reserved)));
  else entries.sort((a,b)=>a[0].localeCompare(b[0]));

  const list=document.getElementById('dupList');
  if(!entries.length){ list.innerHTML = `<div class="item"><b>${lang==='fr'?'Aucun double':'No duplicates'}</b><small>${lang==='fr'?'Tapez pour atteindre x2+':'Tap stickers until x2+'}</small></div>`; setProgressBadge(); return; }

  list.innerHTML = entries.map(([k,v])=>{
    const [code,num]=k.split('-');
    const tt=TEAM_BY_CODE[code];
    const avail=Math.max(0, v.owned-v.reserved);
    const header = `${tt?renderFlag(tt.flag)+' '+tt.code:code} ${num}`;
    const name = tt?.name || '';
    return `<div class="item"><div class="row"><div><b>${header}</b><small>${name}</small></div><div style="text-align:right"><small>key</small><b style="font-size:12px;color:var(--muted)">${k}</b></div></div><div class="kpis"><span class="kpi orange">Owned: ${v.owned}</span><span class="kpi red">Reserved: ${v.reserved}</span><span class="kpi green">Available: ${avail}</span></div><div class="controls"><button class="btn gray" onclick="openEditor('${k}')">Edit</button><button class="btn gray" onclick="openTeam('${code}')">Open team</button></div></div>`;
  }).join('');
  setProgressBadge();
}

function myMissingKeys(){ const ownedSet=new Set(Object.keys(collection).filter(k=>(collection[k]?.owned||0)>0)); return ALL_KEYS.filter(k=>!ownedSet.has(k)); }
function myAvailableKeys(){ const out=[]; for(const k in collection){ const v=normalizeEntry(collection[k]); const avail=v.owned-v.reserved; if(avail>0) out.push([k,avail]); } out.sort((a,b)=>b[1]-a[1]); return out; }
function formatKeyNice(k){ const [c,n]=k.split('-'); const tt=TEAM_BY_CODE[c]; const flag = tt ? renderFlag(tt.flag) : ''; return `${flag} ${tt?tt.code:c} ${n}`; }

function scoreGetKey(key){
  const [code]=key.split('-');
  const [a,b]=rangeFor(code);
  const total=b-a+1;
  let owned=0;
  for(let n=a;n<=b;n++) if((collection[code+'-'+n]?.owned||0)>0) owned++;
  const remaining = total - owned;
  if(tradeMode==='complete'){
    if(remaining==1) return 8;
    if(remaining==2) return 5;
    if(remaining<=4) return 3;
  }
  return 1;
}
function scoreSuggestion(getList, giveList){ const g=getList.length, d=giveList.length; const fair=Math.min(g,d); let s=fair*3 + (g-d)*0.4 + g; s += getList.reduce((acc,x)=>acc+scoreGetKey(x.key),0); return s; }
function pickBundle(getItems, giveItems, maxItems=5){ const maxGet=Math.min(maxItems, getItems.length); const chosenGet=getItems.slice(0,maxGet); let targetGive=maxGet; if(tradeMode==='complete'){ const completionHits=chosenGet.filter(x=>scoreGetKey(x.key)>=5).length; if(completionHits>0) targetGive=Math.max(1, Math.ceil(maxGet/2)); } const chosenGive=giveItems.slice(0, Math.min(giveItems.length, targetGive)); return {get:chosenGet, give:chosenGive}; }

async function loadUserDoc(uid){ const snap=await getDoc(doc(db,'users',uid)); if(!snap.exists()) return null; return snap.data(); }
async function loadPublicDoc(uid){ const snap=await getDoc(doc(db,'usersPublic',uid)); if(!snap.exists()) return null; return snap.data(); }
function isEmpty(obj){ return !obj || Object.keys(obj).length===0; }
function mergeCollections(localCol, cloudCol){ const out={}; const keys=new Set([...Object.keys(localCol||{}), ...Object.keys(cloudCol||{})]); for(const k of keys){ const a=normalizeEntry(localCol?.[k]||{}); const b=normalizeEntry(cloudCol?.[k]||{}); const owned=Math.max(a.owned,b.owned); const reserved=Math.min(owned, Math.max(a.reserved,b.reserved)); if(owned>0||reserved>0) out[k]={owned,reserved}; } return out; }

async function syncDupOffers(uid){
  const userName=profile?.displayName || currentUser.email || 'Collector';
  const userClass=profile?.collectorClass || '';
  const newOffers=new Map();
  for(const k in collection){ const v=normalizeEntry(collection[k]); const avail=v.owned-v.reserved; if(avail>0) newOffers.set(k,{ uid, displayName:userName, collectorClass:userClass, stickerKey:k, available:avail, updatedAt:new Date().toISOString() }); }
  const existing=[];
  const qy=query(fsCollection(db,'dupOffers'), where('uid','==', uid));
  const snap=await getDocs(qy);
  snap.forEach(d=>existing.push({id:d.id,data:d.data()}));
  const batch=writeBatch(db);
  for(const ex of existing){ if(!newOffers.has(ex.data.stickerKey)) batch.delete(doc(db,'dupOffers', ex.id)); }
  for(const [key,payload] of newOffers.entries()){ batch.set(doc(db,'dupOffers', uid+'_'+key), payload, {merge:true}); }
  await batch.commit();
}
async function syncPublicProfile(uid){
  const userName=profile?.displayName || currentUser.email || 'Collector';
  const userClass=profile?.collectorClass || '';
  const ownedSet=new Set(Object.keys(collection).filter(k=>(collection[k]?.owned||0)>0));
  const missingKeys=ALL_KEYS.filter(k=>!ownedSet.has(k));
  await setDoc(doc(db,'usersPublic',uid),{ uid, displayName:userName, collectorClass:userClass, missingKeys, updatedAt:new Date().toISOString() },{merge:true});
}
async function syncToCloud(){ if(!currentUser) return; const uid=currentUser.uid; await setDoc(doc(db,'users',uid),{ updatedAt:new Date().toISOString(), collection },{merge:true}); await syncDupOffers(uid); await syncPublicProfile(uid); }

async function ensureCloudInitialized(){
  if(!currentUser) return;
  const uid=currentUser.uid;
  const data=await loadUserDoc(uid);
  if(!data){
    profile={displayName:'',collectorClass:''};
    await setDoc(doc(db,'users',uid),{ email:currentUser.email||'', displayName:'', collectorClass:'', collection:{}, updatedAt:new Date().toISOString() },{merge:true});
    await setDoc(doc(db,'usersPublic',uid),{ uid, displayName:currentUser.email||'', collectorClass:'', missingKeys:ALL_KEYS.slice(), updatedAt:new Date().toISOString() },{merge:true});
    return;
  }
  profile={displayName:data.displayName||'', collectorClass:data.collectorClass||''};
  const cloudCol=data.collection||{};
  if(isEmpty(cloudCol) && !isEmpty(collection)) await syncToCloud();
  else if(!isEmpty(cloudCol) && isEmpty(collection)) { collection=cloudCol; saveLocal(); }
  else if(!isEmpty(cloudCol) && !isEmpty(collection)) { collection=mergeCollections(collection, cloudCol); saveLocal(); await syncToCloud(); }
}

window.refreshTrades=async function(){
  const el=document.getElementById('tradeList');
  if(!currentUser){ el.innerHTML=`<div class="item"><b>${t('needLoginTitle')}</b><small>${t('needLoginSub')}</small></div>`; toast('🔒'); return; }
  const missing=myMissingKeys();
  const myAvail=myAvailableKeys();
  if(missing.length===0){ el.innerHTML=`<div class="item"><b>${t('completeTitle')}</b><small>${t('completeSub')}</small></div>`; return; }
  if(myAvail.length===0){ el.innerHTML=`<div class="item"><b>${t('noAvailTitle')}</b><small>${t('noAvailSub')}</small></div>`; return; }
  el.innerHTML=`<div class="item"><b>${t('searching')}</b><small>${t('searchingSub')}</small></div>`;

  const chunks=[]; for(let i=0;i<missing.length;i+=10) chunks.push(missing.slice(i,i+10));
  const offers=[]; const maxPar=6;
  for(let i=0;i<chunks.length;i+=maxPar){
    const slice=chunks.slice(i,i+maxPar);
    const res=await Promise.all(slice.map(async keys=>{ const qy=query(fsCollection(db,'dupOffers'), where('stickerKey','in', keys)); const snap=await getDocs(qy); return snap.docs.map(d=>d.data()); }));
    res.flat().forEach(x=>offers.push(x));
  }

  const byUser=new Map();
  for(const o of offers){
    if(o.uid===currentUser.uid) continue;
    const u=byUser.get(o.uid) || {uid:o.uid,name:o.displayName||'Collector',cls:o.collectorClass||'', get:[]};
    u.get.push({key:o.stickerKey, available:o.available||1});
    byUser.set(o.uid,u);
  }
  if(byUser.size===0){ el.innerHTML=`<div class="item"><b>${t('noMatches')}</b><small>${t('noMatchesSub')}</small></div>`; return; }

  const myAvailMap=new Map(myAvail);
  const candidates=Array.from(byUser.values()).sort((a,b)=>b.get.length-a.get.length).slice(0,25);
  const suggestions=[];
  for(let i=0;i<candidates.length;i+=5){
    const slice=candidates.slice(i,i+5);
    const docs=await Promise.all(slice.map(async u=>({u, data: await loadPublicDoc(u.uid)})));
    for(const {u,data} of docs){
      const otherMissing=(data && Array.isArray(data.missingKeys)) ? data.missingKeys : [];
      const otherMissingSet=new Set(otherMissing);
      const give=[];
      for(const [k,avail] of myAvailMap.entries()) if(otherMissingSet.has(k)) give.push({key:k, available:avail});
      give.sort((a,b)=>b.available-a.available);
      const get=u.get.slice();
      get.sort((a,b)=>scoreGetKey(b.key)-scoreGetKey(a.key) || (b.available-a.available));
      if(get.length===0 || give.length===0) continue;
      const bundle=pickBundle(get, give, 5);
      const score=scoreSuggestion(bundle.get, bundle.give);
      suggestions.push({uid:u.uid,name:u.name,cls:u.cls,get:bundle.get,give:bundle.give,score});
    }
  }
  if(!suggestions.length){ el.innerHTML=`<div class="item"><b>${t('noFair')}</b><small>${t('noFairSub')}</small></div>`; return; }
  suggestions.sort((a,b)=>b.score-a.score);
  const top=suggestions.slice(0,15);

  el.innerHTML = top.map(s=>{
    const getText=s.get.map(x=>formatKeyNice(x.key)+` ×${x.available||1}`).join(', ');
    const giveText=s.give.map(x=>formatKeyNice(x.key)+` ×${x.available||1}`).join(', ');
    const clsLine=s.cls ? `<small>${s.cls}</small>` : `<small>—</small>`;
    const msg = (lang==='fr')
      ? `Salut ${s.name} !\n\nJ’ai trouvé un échange possible dans Panini WC26 :\n\nTu pourrais me donner : ${s.get.map(x=>x.key.replace('-', ' ')).join(', ')}\nJe pourrais te donner : ${s.give.map(x=>x.key.replace('-', ' ')).join(', ')}\n\nÇa t’intéresse ?`
      : `Hi ${s.name}!\n\nI found a possible swap in Panini WC26:\n\nYou could give me: ${s.get.map(x=>x.key.replace('-', ' ')).join(', ')}\nI could give you: ${s.give.map(x=>x.key.replace('-', ' ')).join(', ')}\n\nInterested?`;
    return `<div class="item"><div class="row"><div><b>${s.name}</b>${clsLine}</div><div style="text-align:right"><small>Score</small><b style="color:var(--gold)">${Math.round(s.score)}</b></div></div><div class="kpis" style="margin-top:10px"><span class="kpi green">${t('youGet')}: ${s.get.length}</span><span class="kpi orange">${t('youGive')}: ${s.give.length}</span></div><div class="note" style="margin-top:8px"><b>${t('youGet')}</b>: ${getText}</div><div class="note" style="margin-top:6px"><b>${t('youGive')}</b>: ${giveText}</div><div class="controls" style="margin-top:10px"><button class="btn primary" onclick="copyTradeMsg('${s.uid}')">${t('copyMsg')}</button><button class="btn gray" onclick="openUserOffers('${s.uid}')">${t('viewOffers')}</button></div><textarea id="msg_${s.uid}" style="position:absolute;left:-9999px;top:-9999px">${msg}</textarea></div>`;
  }).join('');
};

window.copyTradeMsg=async function(uid){ const ta=document.getElementById('msg_'+uid); if(!ta) return; try{ await navigator.clipboard.writeText(ta.value); toast(t('msgCopied')); }catch(e){ toast(t('copyNA')); } };
window.openUserOffers=async function(uid){ const el=document.getElementById('tradeList'); el.innerHTML=`<div class="item"><b>Loading…</b><small>${lang==='fr'?'Récupération des doubles disponibles':'Fetching available duplicates'}</small></div>`; const qy=query(fsCollection(db,'dupOffers'), where('uid','==', uid)); const snap=await getDocs(qy); const rows=snap.docs.map(d=>d.data()).sort((a,b)=>a.stickerKey.localeCompare(b.stickerKey)); if(!rows.length){ el.innerHTML=`<div class="item"><b>${lang==='fr'?'Aucune offre':'No offers'}</b><small>${lang==='fr'?'Cet utilisateur n’a aucun double disponible.':'This user has no available duplicates.'}</small></div>`; return; } el.innerHTML = `<div class="item"><button class="btn gray" onclick="refreshTrades()">← Back</button></div>` + rows.map(r=>`<div class="item"><b>${formatKeyNice(r.stickerKey)}</b><small>Available: ${r.available||1}</small></div>`).join(''); };

function refreshAll(){ setProgressBadge(); applyLang(); if(document.getElementById('pageTeams').classList.contains('active')) renderTeams(); if(document.getElementById('pageDuplicates').classList.contains('active')) renderDuplicates(); if(document.getElementById('pageTeamGrid').classList.contains('active')) renderStickerGrid(); }

applyLang();
updateUserBadges();
renderTeams();
renderTradesSkeleton();
setProgressBadge();
</script>
