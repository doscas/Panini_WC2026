<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Panini WC 2026</title>
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    :root{--dark:#1a1a2e;--gold:#D4AF37;--bg:#f4f6fa;--card:#fff;--text:#1f2330;--muted:#7c8195;--shadow:0 6px 18px rgba(0,0,0,.08);--radius:14px;--green:#4CAF50;--orange:#FF9800;--red:#E53935}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;background:var(--bg);color:var(--text);padding-bottom:92px}
    .header{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,var(--dark),#16213e);color:#fff;padding:14px 14px 12px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.25)}
    .header h1{margin:0;font-size:18px;font-weight:900}
    .header small{display:block;margin-top:2px;color:rgba(255,255,255,.75);font-weight:800;font-size:11px}
    .meta{display:flex;justify-content:center;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap}
    .badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);border:1px solid rgba(212,175,55,.35);padding:6px 10px;border-radius:999px;font-weight:900;font-size:12px}
    .badge button{border:none;background:rgba(212,175,55,.9);color:var(--dark);font-weight:1100;padding:6px 10px;border-radius:999px;cursor:pointer}

    .page{display:none;padding:14px}
    .page.active{display:block}

    .nav{position:fixed;bottom:0;left:0;right:0;background:var(--dark);display:flex;z-index:60;box-shadow:0 -2px 14px rgba(0,0,0,.25)}
    .nav button{flex:1;border:none;background:transparent;color:rgba(255,255,255,.75);padding:12px 10px 10px;font-weight:1100;cursor:pointer}
    .nav button.active{color:var(--gold)}
    .nav .ico{display:block;font-size:18px}
    .nav .lbl{display:block;font-size:10px;margin-top:2px;letter-spacing:.4px}

    .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:12px}
    .search{flex:1;position:relative}
    .search input{width:100%;padding:12px 14px 12px 38px;border-radius:999px;border:2px solid #e5e7ef;outline:none;font-weight:900}
    .search .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}
    .pillbtn{border:none;border-radius:999px;padding:10px 12px;background:#e9ecf7;color:#2a3a6a;font-weight:1100;cursor:pointer}

    .list{display:flex;flex-direction:column;gap:10px}
    .item{background:var(--card);border-radius:var(--radius);padding:12px;box-shadow:var(--shadow)}
    .row{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .item b{font-size:14px}
    .item small{display:block;color:var(--muted);font-weight:900}
    .kpis{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
    .kpi{background:#f1f4ff;border:1px solid #e3e7ff;border-radius:999px;padding:6px 10px;font-weight:1100;font-size:12px;color:#2a3a6a}
    .kpi.orange{background:#fff3e0;border-color:#ffe0b2;color:#7a4c00}
    .kpi.green{background:#e8f5e9;border-color:#c8e6c9;color:#1e6b2a}
    .kpi.red{background:#ffebee;border-color:#ffcdd2;color:#8b1c1c}

    .btn{border:none;border-radius:12px;padding:10px 12px;font-weight:1100;cursor:pointer}
    .btn.primary{background:#1565C0;color:#fff}
    .btn.gray{background:#e6e8f2;color:#2b3146}

    .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:74px;background:rgba(17,20,31,.96);color:#fff;padding:10px 14px;border-radius:999px;font-weight:1100;font-size:12px;display:none;max-width:92vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:90;align-items:center;justify-content:center;padding:14px}
    .modal.show{display:flex}
    .modal .box{width:100%;max-width:460px;background:#fff;border-radius:18px;padding:16px}
    .modal input{width:100%;padding:12px 14px;border-radius:14px;border:2px solid #e5e7ef;outline:none;font-weight:900}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  </style>
</head>
<body>
  <div class="header">
    <h1>⚽ Panini WC 2026</h1>
    <small>Duplicates • Trades • Firebase Sync</small>
    <div class="meta">
      <div class="badge" id="progressBadge">0 / 980</div>
      <div class="badge" id="userBadge" style="display:none"></div>
      <div class="badge" id="loginBadge"><span id="loginText">Sign in to sync & trade</span> <button id="loginBtn">Sign in</button></div>
    </div>
  </div>

  <div class="page active" id="pageDuplicates">
    <div class="toolbar">
      <div class="search"><span class="icon">🔎</span><input id="dupSearch" placeholder="Search duplicates (ARG-10, BEL-4)…"/></div>
    </div>
    <div class="list" id="dupList"></div>
  </div>

  <div class="page" id="pageTrades">
    <div class="toolbar">
      <button class="pillbtn" id="btnRefreshTrades">🤝 Trade Optimizer</button>
      <button class="pillbtn" id="btnCopyMissing">📋 Copy missing</button>
    </div>
    <div class="list" id="tradeList"></div>
  </div>

  <div class="page" id="pageSettings">
    <div class="item">
      <b>Data</b>
      <small>Local cache + Firebase source of truth (when signed in)</small>
      <div class="kpis">
        <span class="kpi">Local storage key: <code>collection_v3</code></span>
      </div>
      <div style="margin-top:10px" class="grid2">
        <input id="displayName" placeholder="Display name" />
        <input id="collectorClass" placeholder="Class / Group" />
      </div>
      <div style="margin-top:10px" class="grid2">
        <button class="btn gray" id="btnSaveProfile">Save profile</button>
        <button class="btn gray" id="btnLogout">Logout</button>
      </div>
      <div style="margin-top:10px" class="grid2">
        <button class="btn gray" id="btnSeedDemo">Seed demo data</button>
        <button class="btn gray" id="btnResetLocal">Reset local</button>
      </div>
      <small style="margin-top:10px;display:block;">Tip: If you see “unauthorized-domain”, add your GitHub Pages domain in Firebase Auth → Authorized domains.</small>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="modal" id="authModal">
    <div class="box">
      <h3 style="margin:0 0 10px">Sign in</h3>
      <div class="grid2">
        <input id="authEmail" placeholder="Email" autocomplete="email" />
        <input id="authPass" placeholder="Password" type="password" autocomplete="current-password" />
      </div>
      <div style="margin-top:10px" class="grid2">
        <button class="btn primary" id="btnDoLogin">Login</button>
        <button class="btn gray" id="btnDoSignup">Create</button>
      </div>
      <div id="authErr" style="color:#E53935;font-weight:900;margin-top:10px;min-height:18px"></div>
      <div style="margin-top:10px"><button class="btn gray" id="btnCloseAuth">Close</button></div>
    </div>
  </div>

  <div class="nav">
    <button id="navDup" class="active"><span class="ico">📦</span><span class="lbl">Duplicates</span></button>
    <button id="navTrades"><span class="ico">🤝</span><span class="lbl">Trades</span></button>
    <button id="navSettings"><span class="ico">⚙️</span><span class="lbl">Settings</span></button>
  </div>

<script type="module">
  import { firebaseConfig } from './firebase-config.js';
  import { computeDerivedState, buildAllSuggestions, normalizeEntry } from './trade-optimizer.js';

  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, doc, setDoc, getDoc, getDocs, collection as fsCollection } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, setPersistence, browserLocalPersistence } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

  // ---- Album keys (simple: 48 teams x 20 + FWC 20 = 980)
  // NOTE: If your repo already has a full list, replace this generator with your list.
  const TEAMS = [
    'ALG','ARG','AUS','AUT','BEL','BIH','BRA','CAN','CPV','COL','COD','CRO','CUW','CZE','ECU','EGY','ENG','FRA','GER','GHA','HAI','IRN','IRQ','JOR','JPN','KOR','KSA','MAR','MEX','NED','NOR','NZL','PAN','PAR','POR','QAT','RSA','SCO','SEN','ESP','SUI','SWE','TUN','TUR','URU','USA','UZB'
  ];
  function allKeys(){
    const out=[];
    // specials
    for(let i=1;i<=20;i++) out.push('FWC-'+i);
    for(const c of TEAMS){
      for(let i=1;i<=20;i++) out.push(c+'-'+i);
    }
    return out;
  }
  const ALL_KEYS = allKeys();
  const TOTAL = ALL_KEYS.length;

  // ---- Local state
  const LS_KEY = 'collection_v3';
  let collection = JSON.parse(localStorage.getItem(LS_KEY) || '{}'); // {key:{owned,reserved}}
  let profile = JSON.parse(localStorage.getItem('profile_v3') || '{"displayName":"","collectorClass":""}');

  function toast(msg){
    const el=document.getElementById('toast');
    el.textContent=msg;
    el.style.display='block';
    clearTimeout(toast._t);
    toast._t=setTimeout(()=>el.style.display='none', 1200);
  }

  function saveLocal(){ localStorage.setItem(LS_KEY, JSON.stringify(collection)); }
  function saveProfileLocal(){ localStorage.setItem('profile_v3', JSON.stringify(profile)); }

  function ownedUniqueCount(){
    let c=0;
    for(const k of ALL_KEYS){
      const v=normalizeEntry(collection[k]);
      if(v.owned>0) c++;
    }
    return c;
  }
  function updateProgress(){
    const owned=ownedUniqueCount();
    const pct=Math.round(owned/TOTAL*100);
    document.getElementById('progressBadge').textContent=`${owned} / ${TOTAL} (${pct}%)`;
  }

  // ---- Duplicates UI with your rule: available = owned-1-reserved
  const dupSearch=document.getElementById('dupSearch');
  dupSearch.addEventListener('input', renderDuplicates);

  function renderDuplicates(){
    const q=(dupSearch.value||'').trim().toUpperCase().replace(/\s+/g,'');
    const rows=[];
    for(const k of ALL_KEYS){
      const v=normalizeEntry(collection[k]);
      if(v.owned<=1) continue;
      const available = Math.max(0, v.owned - 1 - v.reserved);
      if(q && !k.replace('-','').includes(q)) continue;
      rows.push({k, owned:v.owned, reserved:v.reserved, available});
    }
    rows.sort((a,b)=>b.available-a.available || a.k.localeCompare(b.k));

    const list=document.getElementById('dupList');
    if(!rows.length){
      list.innerHTML = `<div class="item"><b>No duplicates yet</b><small>Get 2+ copies to see them here. Available is always Owned−1 (keeps one for your album).</small></div>`;
      updateProgress();
      return;
    }

    list.innerHTML = rows.map(r=>`
      <div class="item">
        <div class="row">
          <div><b>${r.k}</b><small>Keep 1 copy for your album</small></div>
          <div style="text-align:right"><small>Available</small><b style="color:var(--green)">${r.available}</b></div>
        </div>
        <div class="kpis">
          <span class="kpi orange">Owned: ${r.owned}</span>
          <span class="kpi red">Reserved: ${r.reserved}</span>
          <span class="kpi green">Available: ${r.available}</span>
        </div>
        <div class="kpis" style="margin-top:8px">
          <button class="btn gray" onclick="adj('${r.k}', 1)">+1 owned</button>
          <button class="btn gray" onclick="adj('${r.k}', -1)">-1 owned</button>
          <button class="btn gray" onclick="adjRes('${r.k}', 1)">+1 reserved</button>
          <button class="btn gray" onclick="adjRes('${r.k}', -1)">-1 reserved</button>
        </div>
      </div>
    `).join('');

    updateProgress();
  }

  // Adjusters
  window.adj = function(key, delta){
    const v=normalizeEntry(collection[key]);
    v.owned=Math.max(0, v.owned+delta);
    v.reserved=Math.min(v.reserved, v.owned);
    if(v.owned===0) delete collection[key]; else collection[key]=v;
    saveLocal();
    renderDuplicates();
    scheduleSync();
  };
  window.adjRes = function(key, delta){
    const v=normalizeEntry(collection[key]);
    v.reserved=Math.max(0, Math.min(v.owned, v.reserved+delta));
    if(v.owned===0) delete collection[key]; else collection[key]=v;
    saveLocal();
    renderDuplicates();
    scheduleSync();
  };

  // ---- Navigation
  const pages={Duplicates:'pageDuplicates',Trades:'pageTrades',Settings:'pageSettings'};
  function show(name){
    for(const k in pages) document.getElementById(pages[k]).classList.toggle('active', k===name);
    document.getElementById('navDup').classList.toggle('active', name==='Duplicates');
    document.getElementById('navTrades').classList.toggle('active', name==='Trades');
    document.getElementById('navSettings').classList.toggle('active', name==='Settings');
    if(name==='Trades') renderTradesSkeleton();
    if(name==='Settings') loadProfileUI();
  }
  document.getElementById('navDup').onclick=()=>show('Duplicates');
  document.getElementById('navTrades').onclick=()=>show('Trades');
  document.getElementById('navSettings').onclick=()=>show('Settings');

  // ---- Firebase
  const app=initializeApp(firebaseConfig);
  const db=getFirestore(app);
  const auth=getAuth(app);
  setPersistence(auth, browserLocalPersistence).catch(()=>{});

  let currentUser=null;
  let syncTimer=null;

  function updateAuthBadges(){
    const userBadge=document.getElementById('userBadge');
    const loginBadge=document.getElementById('loginBadge');
    if(!currentUser){
      userBadge.style.display='none';
      loginBadge.style.display='inline-flex';
      return;
    }
    loginBadge.style.display='none';
    userBadge.style.display='inline-flex';
    const nm = profile.displayName || currentUser.email || 'Collector';
    const cl = profile.collectorClass ? (' · '+profile.collectorClass) : '';
    userBadge.innerHTML = `✅ ${nm}${cl}`;
  }

  async function ensureUserDocs(){
    if(!currentUser) return;
    const uid=currentUser.uid;
    const snap=await getDoc(doc(db,'users',uid));
    if(!snap.exists()){
      await setDoc(doc(db,'users',uid),{ email:currentUser.email||'', displayName:profile.displayName||'', collectorClass:profile.collectorClass||'', collection:{}, updatedAt:new Date().toISOString() },{merge:true});
      await setDoc(doc(db,'usersPublic',uid),{ uid, displayName:profile.displayName||currentUser.email||'', collectorClass:profile.collectorClass||'', missingKeys:ALL_KEYS.slice(), giveCounts:{}, updatedAt:new Date().toISOString() },{merge:true});
      return;
    }
    const data=snap.data();
    // Pull profile if present
    profile.displayName = data.displayName || profile.displayName;
    profile.collectorClass = data.collectorClass || profile.collectorClass;
    saveProfileLocal();

    // Merge collections: take max owned & max reserved (bounded)
    const cloud=data.collection||{};
    const merged={};
    const keys=new Set([...Object.keys(collection), ...Object.keys(cloud)]);
    for(const k of keys){
      const a=normalizeEntry(collection[k]);
      const b=normalizeEntry(cloud[k]);
      const owned=Math.max(a.owned,b.owned);
      const reserved=Math.min(owned, Math.max(a.reserved,b.reserved));
      if(owned>0 || reserved>0) merged[k]={owned,reserved};
    }
    collection=merged;
    saveLocal();
  }

  function scheduleSync(){
    if(!currentUser) return;
    clearTimeout(syncTimer);
    syncTimer=setTimeout(()=>syncToCloud().catch(()=>{}), 1200);
  }

  async function syncToCloud(){
    if(!currentUser) return;
    const uid=currentUser.uid;
    const derived=computeDerivedState(collection, ALL_KEYS);

    await setDoc(doc(db,'users',uid),{
      displayName: profile.displayName || '',
      collectorClass: profile.collectorClass || '',
      collection,
      updatedAt: new Date().toISOString()
    },{merge:true});

    await setDoc(doc(db,'usersPublic',uid),{
      uid,
      displayName: profile.displayName || currentUser.email || '',
      collectorClass: profile.collectorClass || '',
      missingKeys: derived.missingKeys,
      giveCounts: derived.giveCounts,
      updatedAt: new Date().toISOString()
    },{merge:true});
  }

  // Auth modal
  const authModal=document.getElementById('authModal');
  const authErr=document.getElementById('authErr');
  document.getElementById('loginBtn').onclick=()=>{authErr.textContent=''; authModal.classList.add('show');};
  document.getElementById('btnCloseAuth').onclick=()=>authModal.classList.remove('show');

  document.getElementById('btnDoLogin').onclick=async ()=>{
    authErr.textContent='';
    const email=document.getElementById('authEmail').value.trim();
    const pass=document.getElementById('authPass').value;
    try{ await signInWithEmailAndPassword(auth,email,pass); authModal.classList.remove('show'); }
    catch(e){ authErr.textContent=e.message||String(e); }
  };

  document.getElementById('btnDoSignup').onclick=async ()=>{
    authErr.textContent='';
    const email=document.getElementById('authEmail').value.trim();
    const pass=document.getElementById('authPass').value;
    try{ await createUserWithEmailAndPassword(auth,email,pass); authModal.classList.remove('show'); }
    catch(e){ authErr.textContent=e.message||String(e); }
  };

  document.getElementById('btnLogout').onclick=()=>signOut(auth);

  onAuthStateChanged(auth, async (user)=>{
    currentUser=user||null;
    if(currentUser){
      await ensureUserDocs();
      await syncToCloud();
    }
    updateAuthBadges();
    renderDuplicates();
    updateProgress();
  });

  // ---- Trades page: pull all public profiles and run optimizer
  const tradeList=document.getElementById('tradeList');

  function renderTradesSkeleton(){
    tradeList.innerHTML = `<div class="item"><b>Trade Optimizer</b><small>Press the button to compute best fair trades (1↔1, 2↔2, …). Availability uses Owned−1−Reserved.</small></div>`;
  }

  async function fetchOtherProfiles(){
    if(!currentUser) return [];
    const snap=await getDocs(fsCollection(db,'usersPublic'));
    const out=[];
    snap.forEach(d=>{
      const v=d.data();
      if(v.uid && v.uid !== currentUser.uid) out.push(v);
    });
    return out;
  }

  function copyText(text){
    navigator.clipboard.writeText(text).then(()=>toast('Copied')).catch(()=>toast('Copy failed'));
  }

  document.getElementById('btnCopyMissing').onclick=()=>{
    const derived=computeDerivedState(collection, ALL_KEYS);
    copyText(derived.missingKeys.join(', '));
  };

  document.getElementById('btnRefreshTrades').onclick=async ()=>{
    if(!currentUser){
      tradeList.innerHTML = `<div class="item"><b>Sign in required</b><small>Trades use Firebase profiles. Sign in first.</small></div>`;
      return;
    }

    tradeList.innerHTML = `<div class="item"><b>Searching…</b><small>Loading other collectors…</small></div>`;

    const others=await fetchOtherProfiles();
    const myDerived=computeDerivedState(collection, ALL_KEYS);

    const suggestions=buildAllSuggestions(myDerived, others, {maxItems: 5});

    if(!suggestions.length){
      tradeList.innerHTML = `<div class="item"><b>No fair trades found</b><small>Either no one published matching duplicates, or there are no reciprocal matches yet.</small></div>`;
      return;
    }

    const top=suggestions.slice(0,20);
    tradeList.innerHTML = top.map(s=>{
      const msg = `Hi ${s.partnerName}!\n\nTrade idea (equal value stickers):\n\nYou give me: ${s.get.join(', ')}\nI give you: ${s.give.join(', ')}\n\nInterested?`;
      const cl = s.partnerClass ? `<small>${s.partnerClass}</small>` : `<small>—</small>`;
      return `<div class="item">
        <div class="row">
          <div><b>🤝 ${s.partnerName}</b>${cl}</div>
          <div style="text-align:right"><small>Gain</small><b style="color:var(--green)">+${s.score}</b></div>
        </div>
        <div class="kpis" style="margin-top:10px">
          <span class="kpi green">You get: ${s.get.length}</span>
          <span class="kpi orange">You give: ${s.give.length}</span>
        </div>
        <div style="margin-top:8px"><small><b>You get</b>: ${s.get.join(', ')}</small></div>
        <div style="margin-top:4px"><small><b>You give</b>: ${s.give.join(', ')}</small></div>
        <div class="kpis" style="margin-top:10px">
          <button class="btn primary" onclick="navigator.clipboard.writeText(${JSON.stringify(msg)}).then(()=>(${json.dumps('')}))">Copy message</button>
          <button class="btn gray" onclick="window.open('mailto:?subject=Panini%20WC26%20Trade&body='+encodeURIComponent(${json.dumps(msg)}))">Email</button>
        </div>
      </div>`;
    }).join('');
  };

  // ---- Profile UI
  function loadProfileUI(){
    document.getElementById('displayName').value = profile.displayName || '';
    document.getElementById('collectorClass').value = profile.collectorClass || '';
  }
  document.getElementById('btnSaveProfile').onclick=async ()=>{
    profile.displayName = document.getElementById('displayName').value.trim();
    profile.collectorClass = document.getElementById('collectorClass').value.trim();
    saveProfileLocal();
    updateAuthBadges();
    toast('Profile saved');
    if(currentUser) await syncToCloud();
  };

  document.getElementById('btnResetLocal').onclick=()=>{
    collection={};
    saveLocal();
    renderDuplicates();
    updateProgress();
    scheduleSync();
  };

  document.getElementById('btnSeedDemo').onclick=()=>{
    // seed a few duplicates for quick testing
    const seed = ['ARG-1','ARG-2','BRA-5','BRA-6','FRA-10','ENG-3'];
    for(const k of seed){
      const v=normalizeEntry(collection[k]);
      v.owned = Math.max(v.owned, 2);
      collection[k]=v;
    }
    saveLocal();
    renderDuplicates();
    updateProgress();
    scheduleSync();
    toast('Demo data seeded');
  };

  // PWA
  if('serviceWorker' in navigator){
    window.addEventListener('load', ()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}));
  }

  // init
  renderDuplicates();
  updateProgress();
  renderTradesSkeleton();
</script>
</body>
</html>
