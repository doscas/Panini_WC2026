<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panini WC 2026</title>

<style>
:root{
  --green:#4CAF50;
  --orange:#FF9800;
  --bg:#f4f6fa;
  --card:#ffffff;
  --text:#222;
}

body{
  margin:0;
  font-family:sans-serif;
  background:var(--bg);
}

.header{
  background:#1a1a2e;
  color:white;
  text-align:center;
  padding:12px;
  font-weight:bold;
}

.page{display:none;padding:12px}
.page.active{display:block}

/* TEAM GRID */
.team-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.team-card{
  background:var(--card);
  border-radius:12px;
  padding:12px;
  text-align:center;
  font-weight:bold;
  cursor:pointer;
}

.team-card small{
  display:block;
  color:#999;
}

/* STICKER GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
}

.cell{
  background:#eee;
  border-radius:10px;
  padding:16px 0;
  text-align:center;
  font-weight:bold;
  cursor:pointer;
  position:relative;
}

.cell.owned{ background:var(--green); color:white;}
.cell.dup{ background:var(--orange); color:white;}

.count{
  position:absolute;
  bottom:2px;
  right:5px;
  font-size:10px;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  background:#1a1a2e;
}

.nav button{
  flex:1;
  padding:12px;
  border:none;
  background:none;
  color:white;
  font-weight:bold;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:70px;
  left:50%;
  transform:translateX(-50%);
  background:#333;
  color:white;
  padding:10px 16px;
  border-radius:20px;
  display:none;
}

/* UNDO */
.undo{
  position:fixed;
  bottom:120px;
  left:50%;
  transform:translateX(-50%);
  background:#fff;
  border:1px solid #ccc;
  padding:8px 16px;
  border-radius:20px;
  display:none;
}

/* DUP LIST */
.list-item{
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:8px;
}
</style>
</head>

<body>

<div class="header">⚽ Panini WC 2026</div>

<!-- TEAM PAGE -->
<div id="teams" class="page active">
  <div class="team-grid" id="teamGrid"></div>
</div>

<!-- STICKER PAGE -->
<div id="stickers" class="page">
  <h3 id="teamTitle"></h3>
  <div class="grid" id="stickerGrid"></div>
</div>

<!-- DUPLICATES PAGE -->
<div id="duplicates" class="page">
  <h3>📦 My Duplicates</h3>
  <div id="dupList"></div>
</div>

<div class="toast" id="toast"></div>
<div class="undo" id="undoBtn" onclick="undo()">Undo</div>

<div class="nav">
  <button onclick="showPage('teams')">Teams</button>
  <button onclick="showPage('duplicates')">Duplicates</button>
</div>
